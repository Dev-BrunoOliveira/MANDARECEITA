<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Manda Receita</title>
    <link rel="stylesheet" href="style_index.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="background-section">
            <div class="welcome-text">
                <h1>Junte-se à nossa <br>comunidade de chefs!</h1>
                <p>Compartilhe suas criações e inspire-se.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-box">
                <div class="logo-container">
                    <h2>Manda Receita</h2>
                </div>
                <h3>Crie sua conta</h3>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullName">Nome Completo</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Seu nome completo" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Seu email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Crie uma senha" required>
                        <span class="toggle-password" onclick="togglePasswordVisibility('password', 'toggleIconPassword')">
                            <i id="toggleIconPassword" class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha" required>
                         <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', 'toggleIconConfirmPassword')">
                            <i id="toggleIconConfirmPassword" class="fas fa-eye"></i>
                        </span>
                    </div>

                    <div class="terms-register"> <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms" class="checkbox-label">Eu li e concordo com os <a href="#" target="_blank">Termos de Serviço</a> e a <a href="#" target="_blank">Política de Privacidade</a>.</label>
                    </div>

                    <button type="submit" class="btn btn-login">Criar Conta</button> </form>

                <div class="separator">OU</div>

                <button type="button" class="btn btn-google" id="googleSignUpButton">
                    <i class="fab fa-google"></i> Cadastre-se com o Google
                </button>

                <hr class="form-divider">

                <div class="signup-link">
                    Já tem uma conta? <a href="index.html">Faça login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script_register.js"></script>
</body>
</html>
